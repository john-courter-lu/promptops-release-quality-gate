# Spec for the client_summary prompt.
# This metadata is the contract the quality gate validates sample outputs against.
# It is version-agnostic: both v1 and v2 prompts are graded against THIS spec.
prompt_id: client_summary
title: Client Engagement Summary
description: >
  Summarizes a synthetic client meeting note into a structured, neutral
  engagement summary. Demonstrates the required-section (FAIL) and
  banned-phrase (FAIL) checks.

compliance_sensitive: false
require_source_grounding: true

# Missing any of these in an output is a FAIL (a dropped section is a regression).
required_sections:
  - Engagement Overview
  - Key Discussion Points
  - Action Items
  - Next Steps

# Presence of any of these is a FAIL (promotional / unsupported language).
banned_phrases:
  - guaranteed results
  - risk-free
  - best-in-class
  - industry-leading

# Presence of any of these is a WARNING (overconfident wording to review).
unsupported_certainty_terms:
  - guaranteed
  - definitely
  - certainly
  - without a doubt
  - 100%
